name: CI & Deploy (MkDocs Material / GitHub Pages)

on:
  push:
    branches: [ "main", "*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  lint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Markdownlint
        uses: DavidAnson/markdownlint-cli2-action@v15
        with:
          globs: |
            **/*.md
            !_sources/**

  linkcheck:
    name: Broken Link Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false
      - name: Install lychee cache (optional)
        uses: actions/cache@v4
        with:
          path: .lycheecache
          key: lychee-${{ runner.os }}-${{ hashFiles('.lychee.toml') }}
      - name: Run lychee
        uses: lycheeverse/lychee-action@v1
        with:
          args: >-
            --config .lychee.toml
            --no-progress
            --accept 200,206,301,302,429
            docs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build Docs (with external sources)
    runs-on: ubuntu-latest
    needs: [lint, linkcheck]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      # External sources checkout (read-only) using PAT
      - name: Checkout Rulebook
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: actions/checkout@v4
        with:
          repository: ssteinbuss/IDSA-Rulebook
          ref: main
          path: _sources/rulebook
          token: ${{ secrets.SOURCE_REPOS_PAT }}

      - name: Checkout RAM5
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: actions/checkout@v4
        with:
          repository: ssteinbuss/RAM5
          ref: main
          path: _sources/ram5
          token: ${{ secrets.SOURCE_REPOS_PAT }}

      - name: Checkout Members Area (Handbook)
        if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false }}
        uses: actions/checkout@v4
        with:
          repository: ssteinbuss/members-area
          ref: main
          path: _sources/handbook
          token: ${{ secrets.SOURCE_REPOS_PAT }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Assemble external content & build merged SUMMARY
        env:
          CI_EVENT_NAME: ${{ github.event_name }}
        run: |
          python scripts/sync_external_content.py

      - name: Build MkDocs (strict)
        run: mkdocs build --strict

      - name: Upload artifact to Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
